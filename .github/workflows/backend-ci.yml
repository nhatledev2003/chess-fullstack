name: Backend CI Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'chess-backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'chess-backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./chess-backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven 

    - name: Build with Maven
      run: mvn clean package -DskipTests